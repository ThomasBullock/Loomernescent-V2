name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint & format check
        run: npm run lint:check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Build
        run: npm run build

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: loomer_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/loomer_test
      DATABASE_SSL: "false"
      SESSION_SECRET: test-session-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm run test

      - name: Integration tests
        run: npm run test:integration

      # Blocking: runs unit + integration together and writes report.json.
      # This step is what gates the check — if any test fails, the job fails.
      - name: Coverage (unit + integration)
        run: npx jest --config jest.coverage.config.js --runInBand --ci --json --coverage --testLocationInResults --outputFile="report.json"

      # Best-effort: posts the coverage comment on PRs by reading the report.json
      # generated above (skip-step: all => it never re-runs tests). continue-on-error
      # keeps a flaky GitHub comment API call ("Premature close") from failing the check.
      - name: Coverage PR comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: ArtiomTr/jest-coverage-report-action@v2.3.1
        with:
          skip-step: all
          coverage-file: report.json
          annotations: none
