name: Test & Build

on:
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: loomer_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # lets the action compute the base-branch coverage diff

      - uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          test-script: npx jest --config jest.coverage.config.js --runInBand
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/loomer_test
          DATABASE_SSL: "false"
          SESSION_SECRET: test-session-secret
          NODE_ENV: test
